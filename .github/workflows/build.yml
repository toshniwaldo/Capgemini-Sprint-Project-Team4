name: Spring Boot CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: classicmodels
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Wait for MySQL
        run: sleep 25

      - name: Build with Maven
        run: mvn clean install
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: demo-jar
          path: target/DemoCheck-0.0.1-SNAPSHOT.jar